<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 羽球排行榜</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:1rem}
.app{max-width:680px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.app-title{font-size:20px;font-weight:500}
.badge{font-size:12px;color:#888;background:#f1efe8;border:1px solid #d3d1c7;border-radius:8px;padding:3px 10px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.metric{background:#f1efe8;border-radius:8px;padding:9px 12px}
.metric .ml{font-size:11px;color:#888;margin-bottom:3px}
.metric .mv{font-size:18px;font-weight:500}
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e0dfd8;border-radius:12px}
.rank-pos{width:26px;font-size:13px;font-weight:500;color:#888;text-align:center;flex-shrink:0}
.rank-pos.gold{color:#BA7517}
.rank-pos.silver{color:#5F5E5A}
.rank-pos.bronze{color:#993C1D}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.rank-name{flex:1;font-size:14px}
.rank-score{font-size:15px;font-weight:500;min-width:36px;text-align:right}
.bar-track{flex:1;height:5px;background:#f1efe8;border-radius:3px;overflow:hidden;min-width:40px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.7s ease}
.session-card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.session-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.session-title{font-size:14px;font-weight:500}
.session-meta{font-size:12px;color:#aaa}
.h-table{width:100%;border-collapse:collapse;font-size:13px}
.h-table th{font-size:12px;color:#888;padding:4px 8px;border-bottom:1px solid #e0dfd8;text-align:left;font-weight:500}
.h-table td{padding:7px 8px;border-bottom:1px solid #e0dfd8}
.h-table tr:last-child td{border-bottom:none}
.h-table td.r{text-align:right}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:#888;font-size:14px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid #e0dfd8;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#FCEBEB;border:1px solid #F7C1C1;border-radius:10px;padding:14px;font-size:13px;color:#A32D2D;margin-bottom:1rem}
.last-update{font-size:11px;color:#aaa;text-align:right;margin-top:4px}
.tab-nav{display:flex;border-bottom:1px solid #e0dfd8;margin-bottom:1.25rem;overflow-x:auto}
.tab-nav button{flex-shrink:0;font-size:13px;padding:8px 14px;border:none;background:transparent;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.tab-nav button.on{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.readonly-badge{font-size:11px;background:#f1efe8;color:#888;border-radius:6px;padding:2px 7px;margin-left:6px}
@media(max-width:480px){.metrics{grid-template-columns:1fr 1fr}.metric:last-child{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="app-title">🏸 羽球排行榜 <span class="readonly-badge">唯讀</span></span>
    <span class="badge" id="lastUpdate">讀取中…</span>
  </div>

  <div class="tab-nav">
    <button class="on" onclick="showTab('rank')">排行榜</button>
    <button onclick="showTab('upcoming')">本週賽程</button>
    <button onclick="showTab('history')">歷史場次</button>
  </div>

  <div id="tab-rank">
    <div id="loadingRank" class="loading"><div class="spinner"></div>讀取資料中…</div>
    <div id="rankContent" style="display:none">
      <div class="metrics" id="metricCards"></div>
      <div class="rank-list" id="rankList"></div>
    </div>
  </div>
  <div id="tab-upcoming" style="display:none">
    <div id="upcomingContent"></div>
  </div>
  <div id="tab-history" style="display:none">
    <div id="histContent"></div>
  </div>
</div>

<script>
/* ================================================
   ★ 唯一需要修改的地方 ★
   把 Apps Script 部署後的 Web App URL 貼在這裡
   ================================================ */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbypIfkSrcSnzZReBu3_65YefnUSYZVumE3xD-0vwiy76KjGjdPyz32R8NFfKheBJh7w/exec';

/* ================================================
   以下不需要修改
   ================================================ */
const AV_BG=['#B5D4F4','#C0DD97','#FAC775','#F4C0D1','#9FE1CB','#CECBF6','#F5C4B3','#F7C1C1','#D3D1C7','#EF9F27'];
const AV_FG=['#0C447C','#27500A','#633806','#72243E','#085041','#3C3489','#712B13','#791F1F','#444441','#412402'];
const TEAM_COLORS=['#378ADD','#1D9E75','#D85A30','#7F77DD','#BA7517','#D4537E','#639922','#888780'];

function avBg(i){return AV_BG[i%AV_BG.length];}
function avFg(i){return AV_FG[i%AV_FG.length];}
function initials(n){return n.trim().slice(0,2).toUpperCase();}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p[0]+'/'+(+p[1])+'/'+(+p[2]);}
function defaultPts(n){const a=[];for(let i=0;i<n;i++)a.push(Math.max(1,n-i));return a;}

let gPlayers=[], gWinPts=2, gSessions=[];



function calcSessionScore(s, winPts){
  const score={};
  (s.attendees||[]).forEach(p=>score[p]=0);
  (s.matches||[]).forEach(m=>{
    const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);
    if(isNaN(sa)||isNaN(sb))return;
    if(sa>sb)(m.teamA||[]).forEach(p=>{if(score[p]!==undefined)score[p]+=winPts;});
    else if(sb>sa)(m.teamB||[]).forEach(p=>{if(score[p]!==undefined)score[p]+=winPts;});
  });
  return score;
}
function calcSessionWins(s){
  const wins={};(s.attendees||[]).forEach(p=>wins[p]=0);
  (s.matches||[]).forEach(m=>{
    const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);if(isNaN(sa)||isNaN(sb))return;
    if(sa>sb)(m.teamA||[]).forEach(p=>{if(wins[p]!==undefined)wins[p]++;});
    else if(sb>sa)(m.teamB||[]).forEach(p=>{if(wins[p]!==undefined)wins[p]++;});
  });
  return wins;
}



function getTotals(players, winPts, sessions){
  return players.map((p,pi)=>{
    let total=0,sessCount=0,totalWins=0;
    sessions.forEach(s=>{
      if(!(s.attendees||[]).includes(p))return;
      const sc=calcSessionScore(s,winPts);
      const w=calcSessionWins(s);
      if(sc[p]!==undefined){total+=sc[p];sessCount++;totalWins+=w[p]||0;}
    });
    return{name:p,total,sessCount,wins:totalWins,idx:pi};
  }).sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));
}

async function fetchData(){
  try{
    const res=await fetch(WEB_APP_URL+'?action=getData&t='+Date.now());
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'讀取失敗');
    return data;
  }catch(e){throw e;}
}

function renderRank(players,winPts,sessions,lastUpdated){
  document.getElementById('loadingRank').style.display='none';
  document.getElementById('rankContent').style.display='';
  document.getElementById('lastUpdate').textContent='更新：'+(lastUpdated||'未知');
  const totals=getTotals(players,winPts,sessions);
  const maxScore=Math.max(...totals.map(t=>t.total),1);
  const mc=document.getElementById('metricCards');
  const leader=totals[0];
  mc.innerHTML=`
    <div class="metric"><div class="ml">目前領先</div><div class="mv">${leader&&leader.total>0?leader.name:'—'}</div></div>
    <div class="metric"><div class="ml">活動場次</div><div class="mv">${sessions.length}</div></div>
    <div class="metric"><div class="ml">參賽人數</div><div class="mv">${players.length}</div></div>`;
  const medals=['🥇','🥈','🥉'];
  const rl=document.getElementById('rankList');rl.innerHTML='';
  if(!players.length){rl.innerHTML='<div class="empty">尚無資料</div>';return;}
  totals.forEach((p,i)=>{
    const pct=maxScore>0?Math.round(p.total/maxScore*100):0;
    const div=document.createElement('div');div.className='rank-row';div.style.cssText='opacity:0;transform:translateY(10px)';
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    div.innerHTML=`<div class="rank-pos ${pc}">${medals[i]||('#'+(i+1))}</div>
      <div class="avatar" style="background:${avBg(p.idx)};color:${avFg(p.idx)}">${initials(p.name)}</div>
      <div class="rank-name">${p.name}<span style="font-size:11px;color:#aaa;margin-left:6px">${p.count}場・${p.wins}勝</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:0%;background:${avFg(p.idx)}"></div></div>
      <div class="rank-score">${p.total}</div>`;
    rl.appendChild(div);
    setTimeout(()=>{div.style.cssText='transition:transform 0.4s cubic-bezier(.22,.68,0,1.2),opacity 0.35s;opacity:1;transform:translateY(0)';},i*55);
    setTimeout(()=>{div.querySelector('.bar-fill').style.width=pct+'%';},i*55+180);
  });
}

function renderHistory(players,winPts,sessions){
  const el=document.getElementById('histContent');
  if(!sessions||!sessions.length){el.innerHTML='<div class="empty">尚無歷史紀錄</div>';return;}
  let html='';
  [...sessions].reverse().forEach(s=>{
    const sc=calcSessionScore(s,winPts);const wins=calcSessionWins(s);
    const sorted=(s.attendees||[]).slice().sort((a,b)=>(sc[b]||0)-(sc[a]||0));
    html+=`<div class="session-card">
      <div class="session-header">
        <span class="session-title">${s.name||'未命名'}</span>
        <span class="session-meta">${fmtDate(s.date)}・${(s.attendees||[]).length}人・${(s.matches||[]).length}場</span>
      </div>`;
    if(sorted.length){
      html+=`<table class="h-table"><thead><tr><th>排名</th><th>選手</th><th>勝場</th><th class="r">積分</th></tr></thead><tbody>`;
      let rank=1;sorted.forEach((p,i)=>{
        if(i>0&&(sc[sorted[i]]||0)!==(sc[sorted[i-1]]||0))rank=i+1;
        html+=`<tr><td>${rank}</td><td>${p}</td><td>${wins[p]||0}</td><td class="r"><strong>${sc[p]||0}</strong></td></tr>`;
      });
      html+=`</tbody></table>`;
    }
    // 每場比分明細
    const scoredMatches=(s.matches||[]).filter(m=>m.scoreA!==''&&m.scoreB!=='');
    if(scoredMatches.length){
      html+=`<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">`;
      scoredMatches.forEach((m,mi)=>{
        const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);
        const aWin=sa>sb,bWin=sb>sa;
        const nameA=(m.teamA||[]).join(' & '),nameB=(m.teamB||[]).join(' & ');
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f9f9f7;border:1px solid #e0dfd8;border-radius:8px;font-size:13px">
          <span style="font-size:11px;color:#aaa;min-width:36px;flex-shrink:0">第${mi+1}場</span>
          <span style="flex:1;font-weight:500;color:${aWin?'#0F6E56':bWin?'#aaa':'#1a1a18'}">${nameA}</span>
          <span style="font-size:15px;font-weight:500;flex-shrink:0;min-width:52px;text-align:center">${sa} : ${sb}</span>
          <span style="flex:1;font-weight:500;text-align:right;color:${bWin?'#0F6E56':aWin?'#aaa':'#1a1a18'}">${nameB}</span>
        </div>
        ${m.waiting&&m.waiting.length?`<div style="font-size:12px;color:#888;padding:2px 12px">等待：${m.waiting.join('・')}</div>`:''}`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  el.innerHTML=html;
}

function showTab(t){
  ['rank','upcoming','history'].forEach(id=>{document.getElementById('tab-'+id).style.display=id===t?'':'none';});
  document.querySelectorAll('.tab-nav button').forEach((b,i)=>{b.classList.toggle('on',['rank','upcoming','history'][i]===t);});
  if(t==='upcoming')renderUpcoming();
}

function renderUpcoming(){
  const el=document.getElementById('upcomingContent');
  const upcoming=gSessions.filter(s=>{
    if(!s.matches||!s.matches.length)return false;
    return !s.matches.some(m=>m.scoreA!==''||m.scoreB!=='');
  });
  if(!upcoming.length){el.innerHTML='<div class="empty">目前沒有待進行的賽程</div>';return;}
  let html='';
  upcoming.forEach(s=>{
    html+=`<div class="session-card">
      <div class="session-header">
        <span class="session-title">${s.name||'未命名'}</span>
        <span class="session-meta">${fmtDate(s.date)}・${(s.attendees||[]).length}人・${s.matches.length}場</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">`;
    s.matches.forEach((m,mi)=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f9f9f7;border:1px solid #e0dfd8;border-radius:8px;font-size:13px">
        <span style="font-size:11px;color:#aaa;min-width:36px">第${mi+1}場</span>
        <span style="flex:1;font-weight:500">${(m.teamA||[]).join(' & ')}</span>
        <span style="color:#aaa;font-size:12px;flex-shrink:0">vs</span>
        <span style="flex:1;font-weight:500;text-align:right">${(m.teamB||[]).join(' & ')}</span>
      </div>
      ${m.waiting&&m.waiting.length?`<div style="font-size:12px;color:#888;padding:4px 8px">等待：${m.waiting.join('・')}</div>`:''}`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

async function init(){
  if(!WEB_APP_URL||WEB_APP_URL==='YOUR_WEB_APP_URL_HERE'){
    document.getElementById('loadingRank').innerHTML='<div class="error-box">請在 index.html 中填入 Web App URL</div>';
    return;
  }
  try{
    const data=await fetchData();
    gPlayers=data.players||[];gWinPts=data.winPts||2;gSessions=data.sessions||[];
    renderRank(gPlayers,gWinPts,gSessions,data.lastUpdated);
    renderHistory(gPlayers,gWinPts,gSessions);
  }catch(e){
    document.getElementById('loadingRank').innerHTML=`<div class="error-box">讀取失敗：${e.message}<br><br>請確認 Web App URL 是否正確。</div>`;
  }
}

init();
</script>
</body>
</html>
